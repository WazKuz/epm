<!DOCTYPE html>
<html>
<head>
<title>EPM</title>
</head>

<body>

<table border="1" cellpadding="5" cellspacing="0" width="600">

<tr>
<th align="center">
<big><big>EPM v1.02</big></big><br>
</th>
</tr>

<tr>
<td>

<pre>
DEBUG:  <span id="debug">---</span>

RUNTIME: <span id="runtime">0s</span>

<span id="message"></span>
</pre>

</td>
</tr>

<tr>
<td>
<a href="#" onclick="toggleExit(); return false;">EXIT (1)</a>&nbsp;&nbsp;
<a href="#" onclick="refresh(); return false;">REFRESH (2)</a>
</td>
</tr>

</table>

<script>
let runtime = 0;
let running = true;

/* Service checks */
function checkServices(){
    let services = {
        online: navigator.onLine,
        storage: !!window.localStorage,
        timing: !!window.performance,
        visibility: document.visibilityState === "visible",
        cookies: navigator.cookieEnabled
    };

    let total = Object.keys(services).length;
    let active = Object.values(services).filter(v => v).length;

    return { active, total, services };
}

/* Debug code (deterministic) */
function generateDebug(services){
    let values = Object.values(services).map(v => v ? 1 : 0).join("");
    let num = parseInt(values, 2) || 0;
    return (100 + num).toString().slice(0,3);
}

/* Message */
function updateMessage(){
    let { active, total, services } = checkServices();

    document.getElementById("message").innerText =
        active + "/" + total + " services active.";

    document.getElementById("debug").innerText =
        generateDebug(services);
}

/* Runtime */
function updateRuntime(){
    if(running){
        runtime++;
        document.getElementById("runtime").innerText = runtime + "s";
    }
}

/* Exit */
function toggleExit(){
    running = !running;

    if(!running){
        document.getElementById("message").innerText =
            "Execution halted.";
    } else {
        updateMessage();
    }
}

/* Refresh */
function refresh(){
    updateMessage();
}

/* Keyboard */
document.addEventListener("keydown", function(e){
    if(e.key === "1") toggleExit();
    if(e.key === "2") refresh();
});

/* Loop */
setInterval(function(){
    updateRuntime();
    updateMessage();
}, 1000);

/* Init */
updateMessage();

</script>

</body>
</html>
