<!DOCTYPE html>
<html>
<head>
<title>EPM</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
padding:40px;
background:#eee;
}

#box{
width:220px;
height:100px;
background:white;
border:1px solid #888;
padding:10px;
box-shadow:4px 4px 0 #999;
margin-top:20px;
}

.gloss{
background:#ff7a00;
color:white;
border:1px solid #b65300;
padding:10px 18px;
border-radius:6px;
margin-right:10px;
margin-top:20px;
cursor:pointer;
position:relative;
box-shadow:2px 2px 3px rgba(0,0,0,0.3);
}

.gloss:after{
content:"";
position:absolute;
left:2px;
right:2px;
top:2px;
height:45%;
background:linear-gradient(rgba(255,255,255,0.7),rgba(255,255,255,0));
border-radius:4px;
}

.gloss:active{
top:1px;
box-shadow:1px 1px 2px rgba(0,0,0,0.4);
}

.disabled{
background:#999;
border-color:#777;
cursor:default;
}

#cmd{
margin-top:20px;
width:220px;
}

</style>
</head>

<body>

<h1>EPM</h1>

<div id="box">
Status: <span id="status">...</span>
</div>

<br>

<button class="gloss" onclick="dump()">Dump</button>
<button id="rfs" class="gloss" onclick="rfs()">Rfs Dir</button>

<br>

<input id="cmd" placeholder="enter command">

<script>

var dev=false;

function check(){
var s=document.getElementById("status");

if(navigator.onLine){
s.innerHTML="null tfc";
}else{
s.innerHTML="prcs act";
}
}

function dump(){
check();
}

function rfs(){

var s=document.getElementById("status");
var b=document.getElementById("rfs");

if(dev){

s.innerHTML="Program Files (x86) / NetSupport";

setTimeout(function(){
check();
},3000);

return;
}

b.innerHTML='<i class="fa fa-check"></i>';
b.disabled=true;
b.className="gloss disabled";

}

document.getElementById("cmd").addEventListener("keydown",function(e){

if(e.key==="Enter"){

var v=this.value.trim();

if(v=="{dev"){
dev=!dev;
}

if(v=="{dump"){
dump();
}

if(v=="{rf"){
rfs();
}

this.value="";
}

});

check();

</script>

</body>
</html>
